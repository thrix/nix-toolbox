---
name: Refresh build.fmf

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install make
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Regenerate configs and docs
        run: make generate/build-fmf

      - name: Create pull request if changed
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676  # v7
        with:
          commit-message: |
            ci: regenerate configs and docs for current Fedora releases
          branch: refresh-build-fmf
          title: 'ci: regenerate configs and docs for current Fedora releases'
          body: |
            Automated weekly refresh of CI configs and docs based on active Fedora releases.
          delete-branch: true
